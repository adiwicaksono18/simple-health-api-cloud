services:
  app:
    build: .
    container_name: simple-health-api
    ports:
      - "8081:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
